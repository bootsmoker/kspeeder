apiVersion: v1
kind: Namespace
metadata:
  name: mirror
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kspeeder-config
  namespace: mirror
data:
  kspeeder.yml: |
    mirrors:
      - url: "https://docker.1ms.run"
      - url: "https://docker.1panel.live"
      - url: "https://docker.367231.xyz"
      - url: "https://docker.amingg.com"
      - url: "https://docker.m.daocloud.io"
      - url: "https://docker.m.ixdev.cn"
      - url: "https://dockerproxy.net"
      - url: "https://hub.1panel.dev"
      - url: "https://image.cloudlayer.icu"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kspeeder-healthcheck
  namespace: mirror
data:
  check.sh: |
    #!/bin/sh

    USAGE=$(du -sm /kspeeder-data | cut -f1)
    MAX_SIZE=4096  # 4GB = 4096MB

    if [ "$USAGE" -gt "$MAX_SIZE" ]; then
      echo "Data directory usage ${USAGE}MB exceeds ${MAX_SIZE}MB"
      exit 1
    fi

    exit 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kspeeder-server
  namespace: mirror
  labels:
    app: kspeeder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kspeeder
  template:
    metadata:
      labels:
        app: kspeeder
    spec:
      containers:
        - name: kspeeder-server
          env:
            - name: TZ
              value: "Asia/Shanghai"
          image: registry.kspeeder.com/linkease/kspeeder:0.7.14
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - /healthcheck/check.sh
            failureThreshold: 3
            initialDelaySeconds: 1800
            periodSeconds: 189
            timeoutSeconds: 10
          ports:
            - containerPort: 5443
              hostPort: 5443
              protocol: TCP
            - containerPort: 5003
              hostPort: 5003
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /kspeeder-config/kspeeder.yml
              subPath: kspeeder.yml
            - name: data
              mountPath: /kspeeder-data
            - name: healthcheck
              mountPath: /healthcheck
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
      hostNetwork: true
      volumes:
        - name: config
          configMap:
            name: kspeeder-config
        - name: data
          emptyDir: {}
        - name: healthcheck
          configMap:
            name: kspeeder-healthcheck
            defaultMode: 0755
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
